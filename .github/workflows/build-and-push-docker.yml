name: Build and Push Docker Images

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push order-service
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./backend/order-service/Dockerfile
          push: true
          tags: bossamrabdelhamid/order-service:latest

      - name: Build and push payment-service
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./backend/payment-service/Dockerfile
          push: true
          tags: bossamrabdelhamid/payment-service:latest

      - name: Build and push notification-service
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./backend/notification-service/Dockerfile
          push: true
          tags: bossamrabdelhamid/notification-service:latest

      - name: Build and push api-gateway
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./api-gateway/Dockerfile
          push: true
          tags: bossamrabdelhamid/api-gateway:latest

      - name: Build and push frontend
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./frontend/Dockerfile
          push: true
          tags: bossamrabdelhamid/frontend:latest