name: CD Pipeline

on:
  workflow_run:
    workflows: ["CI Pipeline"]
    types:
      - completed

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: SSH to server and deploy
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/order-service
            docker pull ${{ secrets.DOCKER_USERNAME }}/payment-service
            docker pull ${{ secrets.DOCKER_USERNAME }}/notification-service
            docker pull ${{ secrets.DOCKER_USERNAME }}/api-gateway
            docker pull ${{ secrets.DOCKER_USERNAME }}/frontend

            docker-compose down
            docker-compose up -d