name: CI Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install root dependencies (optional)
        run: npm install

      - name: Run tests (optional)
        run: echo "No tests yet"

      - name: Login to Docker Hub
        run: echo ${{ secrets.DOCKER_PASSWORD }} | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin

      - name: Build Docker images (with shared folder)
        run: |
          # Build from repo root so shared folder is included
          docker build -f backend/order-service/Dockerfile -t ${{ secrets.DOCKER_USERNAME }}/order-service:latest .
          docker build -f backend/payment-service/Dockerfile -t ${{ secrets.DOCKER_USERNAME }}/payment-service:latest .
          docker build -f backend/notification-service/Dockerfile -t ${{ secrets.DOCKER_USERNAME }}/notification-service:latest .
          docker build -f api-gateway/Dockerfile -t ${{ secrets.DOCKER_USERNAME }}/api-gateway:latest .
          docker build -f frontend/Dockerfile -t ${{ secrets.DOCKER_USERNAME }}/frontend:latest .

      - name: Push Docker images
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/order-service:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/payment-service:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/notification-service:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/api-gateway:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/frontend:latest