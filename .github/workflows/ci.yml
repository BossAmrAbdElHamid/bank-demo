name: CI Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Run tests (optional)
        run: echo "No tests yet"

      - name: Build Docker images
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/order-service ./backend/order-service
          docker build -t ${{ secrets.DOCKER_USERNAME }}/payment-service ./backend/payment-service
          docker build -t ${{ secrets.DOCKER_USERNAME }}/notification-service ./backend/notification-service
          docker build -t ${{ secrets.DOCKER_USERNAME }}/api-gateway ./api-gateway
          docker build -t ${{ secrets.DOCKER_USERNAME }}/frontend ./frontend

      - name: Login to Docker Hub
        run: echo ${{ secrets.DOCKER_PASSWORD }} | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin

      - name: Push images
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/order-service
          docker push ${{ secrets.DOCKER_USERNAME }}/payment-service
          docker push ${{ secrets.DOCKER_USERNAME }}/notification-service
          docker push ${{ secrets.DOCKER_USERNAME }}/api-gateway
          docker push ${{ secrets.DOCKER_USERNAME }}/frontend