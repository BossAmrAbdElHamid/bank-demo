services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181

      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092

      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  order-service:
    image: bossamrabdelhamid/order-service:latest
    depends_on:
      - kafka

  payment-service:
    image: bossamrabdelhamid/payment-service:latest
    depends_on:
      - kafka

  notification-service:
    image: bossamrabdelhamid/notification-service:latest
    depends_on:
      - kafka

  api-gateway:
    image: bossamrabdelhamid/api-gateway:latest
    ports:
      - "3000:3000"
    depends_on:
      - order-service
      - payment-service
      - notification-service

  frontend:
    image: bossamrabdelhamid/frontend:latest
    ports:
      - "80:80"
    depends_on:
      - api-gateway